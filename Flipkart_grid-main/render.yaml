# Render blueprint for the ParkWatch AI FastAPI backend.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: parkwatch-api
    runtime: python
    rootDir: Flipkart_grid-main/backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false # set in Render dashboard
      - key: DATABASE_URL
        sync: false # Supabase/Neon connection string
      - key: CORS_ORIGINS
        sync: false # e.g. https://parkwatch.vercel.app
      - key: PARKWATCH_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12"
